---
name: "Bump Trivy version"
scms:
  image-build-base:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      username: "{{ .github.username }}"
      token: "{{ requiredEnv .github.token }}"
      owner: "rancher"
      repository: "image-build-base"
      branch: "master"
      commitmessage:
        title: "Bump Trivy version"

# aquasecurity/trivy has a IP Allow list for their GitHub API, so we cannot use the standard githubRelease
# kind. Instead we look at their latest GHCR image which matches and is not restricted by the IP Allow list.
# Their GHCR images don't have  a "v" prefix.
sources:
  trivy-release:
    name: "Get Trivy latest release from Registry"
    kind: "dockerimage"
    spec:
      image: "ghcr.io/aquasecurity/trivy"
      versionfilter:
        kind: "semver"
        pattern: ">0.0.0"

conditions:
  trivy-version:
    name: "Check Trivy version in Dockerfile"
    kind: "file"
    scmid: "image-build-base"
    disablesourceinput: true
    spec:
      files:
        - "Dockerfile"
      matchpattern: 'TRIVY_VERSION={{ source `trivy-release` }}'
    failwhen: true

targets:
  trivy-version:
    name: "Update Trivy version in Dockerfile"
    kind: "file"
    scmid: "image-build-base"
    disablesourceinput: true
    spec:
      files:
        - "Dockerfile"
      matchpattern: 'TRIVY_VERSION=\d+\.\d+\.\d+'
      replacepattern: 'TRIVY_VERSION={{ source `trivy-release` }}'

actions:
  github:
    title: "Bump Trivy version"
    kind: "github/pullrequest"
    scmid: "image-build-base"
    spec:
      merge:
        stragety: auto
        mergemethod: squash
      draft: false
      parent: false
